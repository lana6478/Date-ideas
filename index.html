<!DOCTYPE html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam & Liv's Date Ideas</title>


<style>
    body {
        font-family: Arial, sans-serif;
        background: pink;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        font-size: 40px;
    }

    .box {
        background: white;
        padding: 25px;
        margin: 15px auto;
        border-radius: 15px;
        width: 90%;
        max-width: 600px;
        font-size: 28px;
    }

    button {
        font-size: 24px;
        padding: 15px 25px;
        border: none;
        border-radius: 10px;
        background: hotpink;
        color: white;
        cursor: pointer;
    }

    #idea {
        font-size: 32px;
        margin-top: 20px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        display: inline-block;
    }

    .corner-box {
        position: fixed;
        top: 15px;
        right: 15px;
        background: white;
        padding: 15px;
        border-radius: 12px;
        text-decoration: none;
        color: black;
        font-size: 18px;
        font-weight: bold;
    }
</style>

</head>
<body>

<a href="presents.html" class="corner-box">🎁 Presents</a>

<h1>❤️ Sam & Liv's Date Ideas ❤️</h1>

<div class="box">🍿 Movie Night</div>
<div class="box">🍕 Make Pizza Together</div>
<div class="box">🌳 Go For A Picnic</div>
<div class="box">🎳 Go Bowling</div>
<div class="box">🌈 Go Sit In A Field</div>
<div class="box">🏪 Go To An Abandoned Building</div>
<div class="box">👩‍🎨 Make Something</div>

<br><br>

<button onclick="newIdea()">Pick A Random Date Idea</button>

<h2 id="idea"></h2>

<script>
    let ideas = [
        "🍿 Movie Night",
        "🍕 Make Pizza Together",
        "🌳 Go For A Picnic",
        "🎳 Go Bowling",
        "🌈 Go Sit In A Field",
        "🏪 Go To An Abandoned Building",
        "👩‍🎨 Make Something",
        "🎮 Gaming Night",
        "☕ Coffee Date",
        "🌅 Watch The Sunset",
        "🍔 Go Out For Food"
    ];

    function newIdea() {
        let random = Math.floor(Math.random() * ideas.length);
        document.getElementById("idea").innerHTML = ideas[random];
    }
</script>

</body>
</html>
